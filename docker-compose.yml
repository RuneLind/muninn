services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: muninn-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: muninn
      POSTGRES_PASSWORD: muninn
      POSTGRES_DB: muninn
    volumes:
      - muninn-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U muninn"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: muninn-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3010}:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://muninn:muninn@postgres:5432/muninn
      DASHBOARD_PORT: "3000"  # Override .env inside container — host port mapped via ports above
    volumes:
      - ~/.claude:/home/muninn/.claude:ro
      - ./bots:/app/bots:ro
    restart: unless-stopped
    profiles:
      - prod

volumes:
  muninn-pgdata:
