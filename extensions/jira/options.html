<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fafafa;
      --text: #1a1a1a;
      --text-secondary: #666;
      --text-tertiary: #888;
      --input-bg: #fff;
      --input-border: #ccc;
      --info-bg: #f3f4f6;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --saved: #16a34a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --text: #e0e0e0;
        --text-secondary: #aaa;
        --text-tertiary: #888;
        --input-bg: #2a2a2a;
        --input-border: #4a4a4a;
        --info-bg: #2a2a2a;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --saved: #4ade80;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: var(--text);
      background: var(--bg);
    }
    h1 { font-size: 20px; margin-bottom: 20px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 13px; }
    .help { font-size: 11px; color: var(--text-tertiary); margin-bottom: 12px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 4px;
      background: var(--input-bg);
      color: var(--text);
    }
    .field { margin-bottom: 16px; }
    button {
      padding: 8px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: var(--primary-hover); }
    .saved {
      display: inline-block;
      margin-left: 12px;
      color: var(--saved);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .info {
      margin-top: 20px;
      padding: 12px;
      background: var(--info-bg);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Send til analyse — Innstillinger</h1>

  <div class="field">
    <label for="muninnUrl">Muninn URL</label>
    <input type="text" id="muninnUrl" placeholder="http://localhost:3010">
    <div class="help">URL til Muninn dashboard-serveren.</div>
  </div>

  <div class="field">
    <label for="userId">User ID</label>
    <input type="text" id="userId" placeholder="(auto-detect)">
    <div class="help">Din bruker-ID i Muninn. Sett denne for å unngå at du blir spurt hver gang.</div>
  </div>

  <button id="save">Save</button>
  <span class="saved" id="saved">Saved!</span>

  <div class="info">
    Klikk "Send til analyse" på en Jira-sak. Innholdet sendes til Muninn som analyserer det med Claude og viser resultatet i sanntid.
  </div>

  <script src="options.js"></script>
</body>
</html>
