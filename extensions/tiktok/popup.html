<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>TikTok Summarizer</h1>
    </header>

    <div id="video-info" class="hidden">
      <div class="video-title" id="video-title"></div>
      <div class="controls">
        <button id="btn-summarize" class="primary">Summarize</button>
      </div>
    </div>

    <div id="manual">
      <p id="manual-hint" class="hint">Paste a TikTok URL to summarize it:</p>
      <input id="manual-url" type="url" class="url-input"
             placeholder="https://www.tiktok.com/@user/video/…" />
      <div class="controls">
        <button id="btn-manual" class="primary">Summarize URL</button>
      </div>
    </div>

    <div id="status" class="hidden"></div>
  </div>

  <footer>
    <a href="#" id="open-options">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
