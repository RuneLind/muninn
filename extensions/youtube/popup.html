<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>YT Summarizer</h1>
    </header>

    <div id="not-video" class="message hidden">
      <p>Navigate to a YouTube video to summarize it.</p>
    </div>

    <div id="video-info" class="hidden">
      <div class="video-title" id="video-title"></div>
      <div class="controls">
        <button id="btn-summarize" class="primary">Summarize</button>
      </div>
      <div id="status" class="hidden"></div>
    </div>
  </div>

  <footer>
    <a href="#" id="open-options">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
