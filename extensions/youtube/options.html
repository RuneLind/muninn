<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 { font-size: 20px; margin-bottom: 20px; }
    label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .help { font-size: 11px; color: #888; margin-bottom: 12px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .field { margin-bottom: 16px; }
    button {
      padding: 8px 24px;
      background: #d97706;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #b45309; }
    .saved {
      display: inline-block;
      margin-left: 12px;
      color: #16a34a;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .saved.show { opacity: 1; }
    .info {
      margin-top: 20px;
      padding: 12px;
      background: #f3f4f6;
      border-radius: 6px;
      font-size: 12px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>YouTube Summarizer Settings</h1>

  <div class="field">
    <label for="muninnUrl">Muninn URL</label>
    <input type="text" id="muninnUrl" placeholder="http://localhost:3010">
    <div class="help">URL of your Muninn dashboard server.</div>
  </div>

  <button id="save">Save</button>
  <span class="saved" id="saved">Saved!</span>

  <div class="info">
    Clicking "Summarize" submits the video to Muninn and opens the dashboard where you can see the summary streaming in real-time.
  </div>

  <script src="options.js"></script>
</body>
</html>
